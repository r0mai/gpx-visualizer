name: Build Android APK

on:
  push:
  workflow_dispatch:

# Needed so the workflow can create releases / tags with GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Provides Gradle 8.9 on PATH (matches gradle-wrapper.properties) and
      # caches ~/.gradle. Running `gradle` directly means we don't need the
      # binary gradle-wrapper.jar committed to the repo.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      # Decode the release keystore (stored as a base64 repo secret) to a file
      # outside the workspace so it never lands in the APK or artifacts.
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      # Signed with a stable key from repo secrets so updates install over
      # previous builds (no more "App not installed" / uninstall dance).
      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "1.0.${{ github.run_number }}"
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Stage APK
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/dist"
          cp app/build/outputs/apk/release/app-release.apk \
            "${GITHUB_WORKSPACE}/dist/gps-visualizer-${GITHUB_SHA::7}.apk"

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gps-visualizer-apk
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }} (${{ github.ref_name }})"
          body: |
            Automated **release** APK built from commit ${{ github.sha }} on `${{ github.ref_name }}`.

            Install on an Android device (enable "install unknown apps" for your
            browser / file manager first). Signed with a stable release key, so
            it installs as an update over previous builds from this workflow.
          prerelease: true
          files: dist/*.apk
